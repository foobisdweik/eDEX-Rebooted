name: CI

on:
  push:
    branches: [master, post-web-runtime]
  pull_request:
    branches: [master, post-web-runtime]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-fmt:
    name: Rust fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
        working-directory: src-tauri

  rust-clippy:
    name: Rust clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo clippy --target aarch64-apple-darwin --all-targets -- -D warnings
        working-directory: src-tauri

  rust-test:
    name: Rust tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo test --target aarch64-apple-darwin
        working-directory: src-tauri

  js-tests:
    name: JS tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run node:test suites
        run: find src -name '*.test.js' -print0 | xargs -0 node --test

  tauri-build:
    name: Tauri build (aarch64-apple-darwin)
    runs-on: macos-latest
    needs: [rust-fmt, rust-clippy, rust-test, js-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2
      - name: Build
        run: cargo tauri build --target aarch64-apple-darwin --no-bundle
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: edex-ui-aarch64-apple-darwin
          path: src-tauri/target/aarch64-apple-darwin/release/edex-ui
          if-no-files-found: error
          retention-days: 7
