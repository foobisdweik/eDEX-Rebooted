name: Native CI

# Authoritative checks for the native-conversion tree (macos/eDEXNative + crates/).
# This workflow runs the SAME gate agents run locally:
# `bash scripts/native-phase verify --full`. The smoke-window is intentionally
# excluded because it needs a window session.

on:
  push:
    branches: [master, post-web-runtime]
  pull_request:
    branches: [master, post-web-runtime]

concurrency:
  group: native-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-gate:
    name: Native gate (verify --full)
    # The macOS-27 toolchain floor (Package.swift `.macOS(.v27)` + the Metal 4.1
    # shader baseline) requires an Xcode-27-era image. Use the newest macOS
    # runner that provides it. NOTE (human-verify): confirm GitHub-hosted runners
    # actually offer Xcode 27 and adjust the label below if needed.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/edex-ffi
      # Pin the Xcode 27 toolchain so CI and local `native-phase verify --full`
      # agree on the macOS-27 / Metal 4.1 floor. Fails loudly if the runner image
      # lacks Xcode 27 (the signal to bump the runner label above).
      - name: Select Xcode 27
        run: |
          XCODE_APP=/Applications/Xcode_27.app
          if [ ! -d "$XCODE_APP" ]; then
            echo "::error::$XCODE_APP not found on this runner image."
            echo "Available Xcode installs:"
            ls -d /Applications/Xcode*.app 2>/dev/null || echo "  (none)"
            echo "Bump the runner label / Xcode path above to match an available install."
            exit 1
          fi
          sudo xcode-select -switch "$XCODE_APP"
          xcodebuild -version
          swift --version
      - name: Run the native gate
        env:
          SWIFT_BIN: swift
          SWIFT_DISPLAY: swift
          NATIVE_PHASE_FULL: "1"
        run: bash scripts/native-phase verify --full
