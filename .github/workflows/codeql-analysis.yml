name: CodeQL

on:
  push:
    branches: [master, post-web-runtime]
  pull_request:
    branches: [master, post-web-runtime]
  schedule:
    - cron: '20 1 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # The JS/TS codebase is fully retired (Phase 11); scan the GitHub
        # Actions workflows instead. Swift/Rust CodeQL would need a macOS
        # build job and is left as a future enhancement.
        language: ['actions']

    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
